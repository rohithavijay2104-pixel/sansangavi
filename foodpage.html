<!DOCTYPE html>


<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&amp;family=Inter:wght@400;700&amp;family=JetBrains+Mono:wght@500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .active-chip { background-color: #e50914 !important; color: white !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333535; border-radius: 10px; }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "surface-container-low": "#1a1c1c", "background": "#121414", "primary-container": "#e50914", "primary": "#ffb4aa", "on-surface": "#e2e2e2", "on-surface-variant": "#e9bcb6", "surface-variant": "#333535" },
                    fontFamily: { "display-lg": ["Montserrat"], "headline-lg": ["Montserrat"], "body-lg": ["Inter"], "label-caps": ["JetBrains Mono"], "price-tag": ["Inter"], "title-md": ["Montserrat"] }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body-lg antialiased selection:bg-primary-container">
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-xl border-b border-white/10 flex justify-between items-center px-6 md:px-8 py-4">
<h1 class="font-display-lg text-2xl md:text-3xl tracking-tighter text-primary-container">CINEPLEX</h1>
<div class="flex items-center gap-6">
<nav class="hidden md:flex gap-8 font-label-caps text-[12px]">
<a class="text-on-surface-variant" href="#">Movies</a>
<a class="text-primary border-b-2 border-primary pb-1" href="#">Food</a>
<a class="text-on-surface-variant" href="#">Admin</a>
</nav>
<a class="bg-primary-container hover:bg-primary-container/80 text-white px-12 py-4 rounded-full font-label-caps text-lg font-bold transition-all shadow-2xl scale-110 hover:scale-125" href="#payment">Skip</a>
</div>
</header>
<main class="pt-24 pb-32 max-w-7xl mx-auto px-4 md:px-8">
<div class="mb-8 p-4 glass-card rounded-xl flex items-center gap-4 border-l-4 border-primary-container">
<span class="material-symbols-outlined text-primary-container text-3xl">info</span>
<div><p class="font-bold">Interval Service Only</p><p class="text-sm text-on-surface-variant">Food service provided only in Interval breaks.</p></div>
</div>
<section class="mb-12">
<h2 class="font-headline-lg text-3xl mb-6">Snacks &amp; Drinks</h2>
<div class="flex gap-3 overflow-x-auto pb-2 no-scrollbar" id="filters">
<button class="active-chip glass-card border border-white/10 px-6 py-3 rounded-full flex items-center gap-2 font-label-caps text-[12px] shrink-0" data-cat="ALL">
<span class="material-symbols-outlined text-sm">fastfood</span> All Foods
                </button>
<button class="glass-card border border-white/10 px-6 py-3 rounded-full flex items-center gap-2 font-label-caps text-[12px] shrink-0" data-cat="ADULT">
<span class="material-symbols-outlined text-sm">set_meal</span> Adults Food
                </button>
<button class="glass-card border border-white/10 px-6 py-3 rounded-full flex items-center gap-2 font-label-caps text-[12px] shrink-0" data-cat="HEALTHY">
<span class="material-symbols-outlined text-sm">icecream</span> Kids Healthy Foods
                </button>
</div>
</section>
<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6" id="grid"></div>
</main>
<nav class="md:hidden fixed bottom-0 left-0 w-full h-16 bg-surface-container-low/90 backdrop-blur-2xl border-t border-white/5 flex justify-around items-center px-4 z-50 rounded-t-xl">
<div class="flex flex-col items-center opacity-60"><span class="material-symbols-outlined">movie</span><span class="text-[10px] font-label-caps">Movies</span></div>
<div class="flex flex-col items-center text-primary-container"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">fastfood</span><span class="text-[10px] font-label-caps">Food</span></div>
<div class="flex flex-col items-center opacity-60"><span class="material-symbols-outlined">confirmation_number</span><span class="text-[10px] font-label-caps">Tickets</span></div>
<div class="flex flex-col items-center opacity-60"><span class="material-symbols-outlined">person</span><span class="text-[10px] font-label-caps">Profile</span></div>
</nav>
<div class="fixed bottom-20 md:bottom-10 left-1/2 -translate-x-1/2 w-[90%] max-w-2xl glass-card rounded-full p-2 px-6 z-50 hidden flex items-center gap-4 shadow-2xl border-primary-container/30" id="tray">
<span class="text-xs font-label-caps text-primary-container shrink-0">Your Tray:</span>
<div class="flex gap-2 overflow-x-auto no-scrollbar py-1" id="tray-items"></div>
</div><a class="fixed bottom-20 md:bottom-10 right-6 w-16 h-16 bg-primary-container text-white rounded-full shadow-2xl flex items-center justify-center group z-50" href="#payment">
<span class="material-symbols-outlined text-3xl group-hover:scale-110 transition-transform">shopping_basket</span>
<div class="absolute -top-1 -right-1 w-6 h-6 bg-white text-primary-container font-bold text-xs rounded-full flex items-center justify-center border-2 border-primary-container" id="cart-badge">0</div>
</a>

        const grid = document.getElementById('grid'), badge = document.getElementById('cart-badge');
        
        function render(cat = 'ALL') {
            grid.innerHTML = items.filter(i => cat === 'ALL' || i.c === cat).map(i => `
                <div class="glass-card rounded-xl overflow-hidden group hover:border-primary-container transition-all">
                    <div class="h-40 relative bg-surface-container-low overflow-hidden">
                        <img src="${i.img}" class="w-full h-full object-cover transition-transform group-hover:scale-110">
                        <div class="absolute top-2 right-2 px-2 py-1 bg-black/60 rounded text-[10px] font-label-caps text-white">${i.c}</div>
                    </div>
                    <div class="p-4 flex flex-col justify-between h-32">
                        <h3 class="text-sm font-semibold">${i.n}</h3>
                        <div class="flex justify-between items-center mt-auto">
                            <span class="text-primary-container font-bold">₹ ${i.p}</span>
                            <button onclick="updateCart()" class="w-8 h-8 rounded-full bg-primary-container text-white flex items-center justify-center hover:scale-110 active:scale-90">
                                <span class="material-symbols-outlined text-sm">add</span>
                            </button>
                        </div>
                    </div>
                </div>`).join('');
        }


        window.updateCart = () => badge.innerText = ++cartCount;
        
        document.getElementById('filters').addEventListener('click', e => {
            const btn = e.target.closest('button');
            if (!btn) return;
            document.querySelectorAll('#filters button').forEach(b => b.classList.remove('active-chip'));
            btn.classList.add('active-chip');
            render(btn.dataset.cat);
        });


        render();
    </script>
